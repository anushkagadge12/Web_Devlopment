
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Hospital</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1500&q=80");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
}

header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:18px;
}

.hero{
    min-height:85vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:50px;
}

.hero p{
    font-size:22px;
    margin:20px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1e7e34;
}

/* Popup */

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    overflow-y:auto;
    padding:30px 0;
}

.modal-content{
    background:white;
    width:90%;
    max-width:550px;
    margin:auto;
    border-radius:10px;
    padding:20px;
    position:relative;
    max-height:90vh;
    overflow-y:auto;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:30px;
    cursor:pointer;
    font-weight:bold;
}

h2{
    text-align:center;
    color:#0077b6;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

input[type="submit"]{
    background:#0077b6;
    color:white;
    font-size:18px;
    border:none;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#005f8d;
}

@media(max-width:600px){

.hero h1{
font-size:35px;
}

.hero p{
font-size:18px;
}

.modal-content{
width:95%;
max-height:95vh;
}

}
</style>

</head>
<body>

<header>
<h1>MAX Hospital</h1>
</header>

<section class="hero">
<h1>Welcome to MAX Hospital</h1>
<p>Your Health, Our Priority</p>

<button onclick="openForm()">Book Appointment</button>

</section>

<div class="modal" id="popup">

<div class="modal-content">

<span class="close" onclick="closeForm()">&times;</span>

<h2>Hospital Appointment Form</h2>

<form onsubmit="bookAppointment(event)">

<label>Patient Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Age</label>
<input type="number" min="1" max="120" required>

<label>Gender</label>
<select required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Mobile Number</label>
<input type="tel" pattern="[0-9]{10}" placeholder="Enter 10-digit mobile number" required>

<label>Email</label>
<input type="email" placeholder="Enter email address">

<label>Select Doctor</label>
<select required>
<option value="">Choose Doctor</option>
<option>Dr. Sharma - General Physician</option>
<option>Dr. Mehta - Cardiologist</option>
<option>Dr. Patel - Dentist</option>
<option>Dr. Verma - Orthopedic</option>
</select>

<label>Appointment Date</label>
<input type="date" required>

<label>Appointment Time</label>
<input type="time" required>

<label>Reason for Visit</label>
<textarea rows="4" placeholder="Describe your problem"></textarea>

<input type="submit" value="Book Appointment">

</form>

</div>

</div>

<script>

function openForm(){
document.getElementById("popup").style.display="block";
document.body.style.overflow="hidden";
}

function closeForm(){
document.getElementById("popup").style.display="none";
document.body.style.overflow="auto";
}

window.onclick=function(event){
let modal=document.getElementById("popup");
if(event.target==modal){
closeForm();
}
}

function bookAppointment(event){
event.preventDefault();

alert("✅ Appointment Booked Successfully!\n\nThank you for choosing MAX Hospital.");

document.querySelector("form").reset();

closeForm();
}

</script>

</body>
</html>
